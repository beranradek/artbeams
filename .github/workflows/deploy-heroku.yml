name: Deploy to Heroku

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-heroku-production
  cancel-in-progress: false

env:
  HEROKU_APP_NAME: ${{ vars.HEROKU_APP_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate deploy configuration
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${HEROKU_APP_NAME:-}" ]; then
            echo "::error::Missing repository variable HEROKU_APP_NAME"
            exit 1
          fi

          if [ -z "${HEROKU_API_KEY:-}" ]; then
            echo "::error::Missing repository secret HEROKU_API_KEY"
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      - name: Build
        run: ./gradlew build

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Verify Heroku app access
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku apps:info -a "$HEROKU_APP_NAME" >/dev/null

      - name: Deploy to Heroku Git remote
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          set -euo pipefail
          git remote add heroku "https://:${HEROKU_API_KEY}@git.heroku.com/${HEROKU_APP_NAME}.git"
          git push heroku HEAD:main
